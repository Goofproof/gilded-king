<!-- Plain script tags, no modules: works from a local server AND by double-clicking the file. -->
<script>
// ============================================================================
// audio.js - all sound effects synthesized with the Web Audio API (no assets).
// Sfx.play('name') from anywhere. M toggles mute (persisted in localStorage).
// ============================================================================
const Sfx = (() => {
  let ctx = null, master = null;
  // storage can THROW in sandboxed iframes / all-cookies-blocked profiles -
  // sound preferences just won't persist there
  let muted = false;
  try { muted = localStorage.getItem('drl_muted') === '1'; } catch { }

  function ensure() {
    // AudioContext must be created/resumed after a user gesture; called on first input.
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = muted ? 0 : 0.5;
      master.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }

  // --- tiny synth helpers -------------------------------------------------
  function env(node, t0, a, peak, d, end = 0.0001) {
    node.gain.setValueAtTime(0.0001, t0);
    node.gain.linearRampToValueAtTime(peak, t0 + a);
    node.gain.exponentialRampToValueAtTime(end, t0 + a + d);
  }
  // one oscillator blip: type, start freq, end freq, attack, decay, volume
  function tone(type, f0, f1, a, d, vol, delay = 0) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime + delay;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + a + d);
    env(g, t0, a, vol, d);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + a + d + 0.05);
  }
  // white-noise burst through a filter: for hits, explosions, whooshes
  function noise(dur, vol, filterType, f0, f1, delay = 0) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime + delay;
    const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const fl = ctx.createBiquadFilter(); fl.type = filterType;
    fl.frequency.setValueAtTime(f0, t0);
    fl.frequency.exponentialRampToValueAtTime(Math.max(10, f1), t0 + dur);
    const g = ctx.createGain();
    env(g, t0, 0.005, vol, dur);
    src.connect(fl); fl.connect(g); g.connect(master);
    src.start(t0); src.stop(t0 + dur + 0.05);
  }

  // --- the sound table ------------------------------------------------------
  const table = {
    swing:    () => { noise(0.09, 0.25, 'bandpass', 900, 2400); },
    heavy:    () => { noise(0.16, 0.4, 'bandpass', 300, 1400); tone('square', 120, 60, 0.01, 0.12, 0.25); },
    hit:      () => { noise(0.06, 0.3, 'highpass', 1000, 3000); tone('square', 220, 90, 0.005, 0.06, 0.2); },
    hurt:     () => { tone('sawtooth', 200, 70, 0.01, 0.18, 0.35); noise(0.12, 0.2, 'lowpass', 800, 200); },
    kill:     () => { tone('square', 300, 40, 0.01, 0.2, 0.25); noise(0.15, 0.25, 'lowpass', 1200, 100); },
    coin:     () => { tone('sine', 1100, 1600, 0.005, 0.09, 0.18); tone('sine', 1650, 2200, 0.005, 0.08, 0.12, 0.05); },
    pickup:   () => { tone('triangle', 500, 900, 0.01, 0.12, 0.2); tone('triangle', 750, 1350, 0.01, 0.12, 0.15, 0.06); },
    heal:     () => { tone('sine', 400, 800, 0.02, 0.25, 0.22); tone('sine', 600, 1200, 0.02, 0.25, 0.15, 0.08); },
    roll:     () => { noise(0.14, 0.22, 'bandpass', 500, 2500); },
    bowdraw:  () => { noise(0.18, 0.1, 'bandpass', 300, 900); tone('sine', 150, 260, 0.15, 0.05, 0.06); },
    bowfire:  () => { noise(0.07, 0.3, 'highpass', 1500, 4000); tone('square', 700, 200, 0.005, 0.07, 0.12); },
    door:     () => { tone('square', 90, 55, 0.01, 0.3, 0.3); noise(0.25, 0.15, 'lowpass', 500, 80); },
    unlock:   () => { tone('triangle', 350, 700, 0.01, 0.15, 0.2); tone('triangle', 520, 1050, 0.01, 0.15, 0.16, 0.1); },
    levelup:  () => { [440, 554, 659, 880].forEach((f, i) => tone('triangle', f, f, 0.01, 0.22, 0.2, i * 0.09)); },
    buy:      () => { tone('sine', 900, 1400, 0.005, 0.1, 0.2); tone('sine', 1400, 2000, 0.005, 0.12, 0.15, 0.08); },
    error:    () => { tone('square', 160, 120, 0.01, 0.15, 0.2); },
    explode:  () => { noise(0.4, 0.5, 'lowpass', 2000, 60); tone('square', 90, 30, 0.01, 0.35, 0.3); },
    mimic:    () => { tone('sawtooth', 500, 90, 0.02, 0.35, 0.35); noise(0.3, 0.25, 'bandpass', 400, 1800); },
    roar:     () => { tone('sawtooth', 140, 50, 0.05, 0.7, 0.45); noise(0.7, 0.3, 'lowpass', 900, 100); tone('sawtooth', 95, 40, 0.05, 0.8, 0.3, 0.1); },
    stairs:   () => { [300, 240, 190, 150].forEach((f, i) => tone('triangle', f, f * 0.9, 0.01, 0.18, 0.2, i * 0.11)); },
    ui:       () => { tone('sine', 700, 900, 0.005, 0.06, 0.12); },
    upgrade:  () => { [523, 659, 784].forEach((f, i) => tone('sine', f, f, 0.01, 0.2, 0.18, i * 0.07)); },
    crit:     () => { noise(0.08, 0.35, 'highpass', 2000, 5000); tone('square', 900, 300, 0.005, 0.09, 0.2); },
    burn:     () => { noise(0.12, 0.12, 'bandpass', 1200, 600); },
  };

  return {
    ensure,
    play(name) { if (ctx && !muted && table[name]) table[name](); },
    toggleMute() {
      muted = !muted;
      try { localStorage.setItem('drl_muted', muted ? '1' : '0'); } catch { }
      if (master) master.gain.value = muted ? 0 : 0.5;
      return muted;
    },
    get muted() { return muted; },
  };
})();

</script>
<script>
// ============================================================================
// fx.js - juice: particles, screen shake, hit-stop, floating text, afterimages.
// ============================================================================
const Fx = (() => {
  const particles = [];   // {x,y,vx,vy,r,color,life,maxLife,grav,glow}
  const texts = [];       // floating damage numbers / notices
  const ghosts = [];      // dodge-roll afterimages: {draw fn snapshot via params}
  let shakeMag = 0, shakeT = 0, shakeDur = 0;
  let hitstopT = 0;

  function burst(x, y, color, n, opts = {}) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = (opts.speed || 120) * (0.3 + Math.random());
      particles.push({
        x, y,
        vx: Math.cos(a) * sp + (opts.vx || 0),
        vy: Math.sin(a) * sp + (opts.vy || 0),
        r: (opts.size || 3) * (0.5 + Math.random()),
        color: Array.isArray(color) ? color[(Math.random() * color.length) | 0] : color,
        life: 0, maxLife: (opts.life || 0.5) * (0.6 + Math.random() * 0.8),
        grav: opts.grav || 0, glow: opts.glow || false, drag: opts.drag ?? 0.92,
      });
    }
  }

  function text(x, y, str, color = '#fff', size = 13) {
    texts.push({ x, y, str, color, size, life: 0, maxLife: 0.8, vy: -55 });
  }

  function ghost(snap) { ghosts.push({ ...snap, life: 0, maxLife: 0.3 }); }

  function shake(mag, dur) {
    if (mag >= shakeMag || shakeT >= shakeDur) { shakeMag = mag; shakeT = 0; shakeDur = dur; }
  }
  function hitstop(dur) { hitstopT = Math.max(hitstopT, dur); }

  function update(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += dt;
      if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= p.drag; p.vy *= p.drag;
      p.vy += p.grav * dt;
    }
    for (let i = texts.length - 1; i >= 0; i--) {
      const t = texts[i];
      t.life += dt;
      if (t.life >= t.maxLife) { texts.splice(i, 1); continue; }
      t.y += t.vy * dt; t.vy *= 0.9;
    }
    for (let i = ghosts.length - 1; i >= 0; i--) {
      ghosts[i].life += dt;
      if (ghosts[i].life >= ghosts[i].maxLife) ghosts.splice(i, 1);
    }
    if (shakeT < shakeDur) shakeT += dt;
  }

  // hit-stop is ticked from the main loop so it can freeze entity updates
  function tickHitstop(dt) {
    if (hitstopT > 0) { hitstopT -= dt; return true; }
    return false;
  }

  function getShake() {
    if (shakeT >= shakeDur) return { x: 0, y: 0 };
    const falloff = 1 - shakeT / shakeDur;
    const m = shakeMag * falloff;
    return { x: (Math.random() * 2 - 1) * m, y: (Math.random() * 2 - 1) * m };
  }

  function drawGhosts(c) {
    for (const g of ghosts) {
      const a = 0.35 * (1 - g.life / g.maxLife);
      c.save();
      c.globalAlpha = a;
      c.translate(g.x, g.y);
      c.rotate(g.rot || 0);
      c.scale(g.sx || 1, g.sy || 1);
      c.fillStyle = g.color || '#7fd4ff';
      c.beginPath(); c.arc(0, 0, g.r || 13, 0, Math.PI * 2); c.fill();
      c.restore();
    }
  }

  // pre-rendered glow sprites: per-particle shadowBlur forces a rasterize+blur
  // pass PER FILL, which hitches integrated-GPU laptops exactly on big bursts
  // (boss death = 80 glow particles). drawImage of a cached canvas is ~10x cheaper.
  const glowSprites = {};
  function glowSprite(color) {
    let s = glowSprites[color];
    if (!s) {
      s = document.createElement('canvas');
      s.width = s.height = 32; // 8px core + 8px blur margin, 2x
      const sc = s.getContext('2d');
      sc.shadowColor = color; sc.shadowBlur = 8;
      sc.fillStyle = color;
      sc.beginPath(); sc.arc(16, 16, 8, 0, Math.PI * 2); sc.fill();
      glowSprites[color] = s;
    }
    return s;
  }

  function draw(c) {
    for (const p of particles) {
      const a = 1 - p.life / p.maxLife;
      c.globalAlpha = a;
      const pr = p.r * a;
      if (p.glow) {
        const half = pr * 2;
        c.drawImage(glowSprite(p.color), p.x - half, p.y - half, half * 2, half * 2);
      } else {
        c.fillStyle = p.color;
        c.beginPath(); c.arc(p.x, p.y, pr, 0, Math.PI * 2); c.fill();
      }
    }
    c.globalAlpha = 1;
    for (const t of texts) {
      const a = 1 - t.life / t.maxLife;
      c.globalAlpha = a;
      c.font = `bold ${t.size}px monospace`;
      c.textAlign = 'center';
      c.fillStyle = '#000'; c.fillText(t.str, t.x + 1, t.y + 1);
      c.fillStyle = t.color; c.fillText(t.str, t.x, t.y);
    }
    c.globalAlpha = 1;
  }

  function clear() { particles.length = 0; texts.length = 0; ghosts.length = 0; hitstopT = 0; }

  return { burst, text, ghost, shake, hitstop, update, tickHitstop, getShake, draw, drawGhosts, clear };
})();

</script>
<script>
// ============================================================================
// weapons.js - weapon archetypes, rarity rolls, enchant tables.
// ALL TUNING TABLES LIVE AT THE TOP OF THIS FILE - tweak numbers freely.
// ============================================================================
const Weapons = (() => {

  // --- RARITY TABLE ---------------------------------------------------------
  // weight: roll weight out of the total (these sum to 100, per the design doc)
  // slots: [min,max] enchant slots. maxTier: highest enchant tier allowed.
  const RARITY = [
    { key: 'common',    name: 'Common',    color: '#e8e8e8', weight: 50, slots: [0, 0], maxTier: 0, price: 15  },
    { key: 'uncommon',  name: 'Uncommon',  color: '#4ade80', weight: 28, slots: [1, 1], maxTier: 1, price: 30  },
    { key: 'rare',      name: 'Rare',      color: '#38bdf8', weight: 15, slots: [1, 2], maxTier: 1, price: 60  },
    { key: 'epic',      name: 'Epic',      color: '#a78bfa', weight: 6,  slots: [2, 3], maxTier: 2, price: 110 },
    { key: 'legendary', name: 'Legendary', color: '#fbbf24', weight: 1,  slots: [3, 3], maxTier: 3, price: 200 },
  ];
  // enchant tier roll weights within a slot: minor 55 / major 35 / signature 10
  const TIER_WEIGHTS = [ { tier: 1, w: 55 }, { tier: 2, w: 35 }, { tier: 3, w: 10 } ];
  const TIER_NAMES = { 1: 'minor', 2: 'major', 3: 'signature' };

  // --- ENCHANT TABLE ----------------------------------------------------------
  // pool: 'melee' | 'bow' | 'any'.  tier: 1 minor, 2 major, 3 signature.
  // leveled: rolls I/II/III (higher levels gated to higher rarity).
  // 'Vampiric' and 'Momentum' are ORIGINAL additions (not from Minecraft).
  const ENCHANTS = [
    // bow pool
    { key: 'flame',     name: 'Flame',         pool: 'bow',   tier: 2, desc: 'Arrows ignite: burn damage over time' },
    { key: 'piercing',  name: 'Piercing',      pool: 'bow',   tier: 2, desc: 'Arrows pass through enemies' },
    { key: 'power',     name: 'Power',         pool: 'bow',   tier: 1, leveled: true, desc: '+damage per level' },
    { key: 'punch',     name: 'Punch',         pool: 'bow',   tier: 1, desc: 'Arrows knock enemies back' },
    { key: 'multishot', name: 'Multishot',     pool: 'bow',   tier: 3, desc: 'Fires 3 arrows in a spread' },
    { key: 'infinity',  name: 'Infinity',      pool: 'bow',   tier: 3, desc: 'Greatly increased fire rate' }, // bows have no ammo, so Infinity = fire rate (allowed by the design doc)
    // melee pool
    { key: 'fireaspect',name: 'Fire Aspect',   pool: 'melee', tier: 2, desc: 'Hits ignite the target' },
    { key: 'executioner',name:'Executioner',   pool: 'melee', tier: 3, desc: 'Finishes enemies below 30% health' }, // ORIGINAL - melee needs a signature so legendaries keep their guarantee
    { key: 'sharpness', name: 'Sharpness',     pool: 'melee', tier: 1, leveled: true, desc: '+damage per level' },
    { key: 'knockback', name: 'Knockback',     pool: 'melee', tier: 1, desc: 'Hits knock enemies back' },
    { key: 'sweeping',  name: 'Sweeping Edge', pool: 'melee', tier: 2, desc: 'Bigger swing arc and range' },
    // universal
    { key: 'looting',   name: 'Looting',       pool: 'any',   tier: 1, desc: 'More coins and better drops' },
    { key: 'vampiric',  name: 'Vampiric',      pool: 'any',   tier: 2, desc: 'Kills restore a little health' },   // ORIGINAL
    { key: 'momentum',  name: 'Momentum',      pool: 'any',   tier: 1, desc: 'Brief speed burst after a kill' },  // ORIGINAL
  ];

  // --- ARCHETYPE BASE STATS ---------------------------------------------------
  // dmg scales +10% per rarity step and +8% per dungeon tier (see rollWeapon).
  const ARCHETYPES = {
    heavy: { dmg: 26, cooldown: 0.95, windup: 0.30, range: 82, arc: 2.4, stagger: 0.55,
             names: ['Cleaver', 'Warhammer', 'Greataxe', 'Maul'] },
    light: { dmg: 9,  cooldown: 0.22, windup: 0.0,  range: 54, arc: 1.15, stagger: 0.0,
             names: ['Dagger', 'Shortsword', 'Rapier', 'Twinfang'] },
    bow:   { dmg: 14, cooldown: 0.45, windup: 0.0,  range: 0,  arc: 0, projSpeed: 540,
             names: ['Shortbow', 'Hunting Bow', 'Longbow', 'Recurve'] },
  };
  const PREFIX = { common: 'Worn', uncommon: 'Sturdy', rare: 'Fine', epic: 'Runed', legendary: 'Mythic' };
  const ROMAN = ['', 'I', 'II', 'III'];

  // --- helpers ---------------------------------------------------------------
  function weightedPick(list, wKey) {
    let total = 0; for (const e of list) total += e[wKey];
    let r = Math.random() * total;
    for (const e of list) { r -= e[wKey]; if (r <= 0) return e; }
    return list[list.length - 1];
  }

  function rollRarity(opts = {}) {
    if (opts.exactRarity !== undefined) return RARITY[opts.exactRarity]; // pinned roll (e.g. starting weapon)
    const minIdx = opts.minRarity || 0;
    const pool = RARITY.filter((r, i) => i >= minIdx);
    let pick = weightedPick(pool, 'weight');
    // luck (from Looting / mimic rewards): reroll once, keep the better result
    if (opts.luck && Math.random() < opts.luck) {
      const p2 = weightedPick(pool, 'weight');
      if (RARITY.indexOf(p2) > RARITY.indexOf(pick)) pick = p2;
    }
    return pick;
  }

  function rollEnchants(archetype, rar) {
    const rarIdx = RARITY.indexOf(rar);
    const nSlots = rar.slots[0] + ((Math.random() * (rar.slots[1] - rar.slots[0] + 1)) | 0);
    const poolKey = archetype === 'bow' ? 'bow' : 'melee';
    const avail = ENCHANTS.filter(e => (e.pool === poolKey || e.pool === 'any') && e.tier <= rar.maxTier);
    const out = [];
    let needSignature = rar.key === 'legendary'; // legendary guarantees >=1 signature enchant
    for (let s = 0; s < nSlots && avail.length; s++) {
      let candidates = null;
      if (needSignature && s === nSlots - 1 && !out.some(e => e.tier === 3)) {
        candidates = avail.filter(e => e.tier === 3 && !out.some(o => o.key === e.key));
      } else {
        // roll the slot's tier at the spec'd 55/35/10 split, then pick from EXACTLY
        // that tier (picking from "up to" the tier diluted signatures to ~2%);
        // fall back to lower tiers only when the rolled tier's pool is exhausted
        const tierRoll = weightedPick(TIER_WEIGHTS.filter(t => t.tier <= rar.maxTier), 'w').tier;
        for (let t = tierRoll; t >= 1 && !(candidates && candidates.length); t--) {
          candidates = avail.filter(e => e.tier === t && !out.some(o => o.key === e.key));
        }
      }
      if (!candidates.length) candidates = avail.filter(e => !out.some(o => o.key === e.key));
      if (!candidates.length) break;
      const e = candidates[(Math.random() * candidates.length) | 0];
      const ench = { key: e.key, name: e.name, tier: e.tier, desc: e.desc, level: 0 };
      if (e.leveled) {
        // level gating: III only on epic+, II on rare+ (mirrors Minecraft-style gating)
        const maxLv = rarIdx >= 3 ? 3 : rarIdx >= 2 ? 2 : 1;
        const roll = Math.random();
        ench.level = roll < 0.55 ? 1 : roll < 0.85 ? Math.min(2, maxLv) : maxLv;
      }
      out.push(ench);
    }
    return out;
  }

  // main entry: tier = dungeon depth tier (1..6ish), opts {archetype, minRarity, luck}
  function rollWeapon(tier = 1, opts = {}) {
    const archKey = opts.archetype || ['heavy', 'light', 'bow'][(Math.random() * 3) | 0];
    const arch = ARCHETYPES[archKey];
    const rar = rollRarity(opts);
    const rarIdx = RARITY.indexOf(rar);
    const enchants = rollEnchants(archKey, rar);
    const dmgScale = (1 + rarIdx * 0.10) * (1 + (tier - 1) * 0.08);
    const w = {
      archetype: archKey,
      rarity: rar.key, rarityName: rar.name, color: rar.color, rarIdx,
      name: `${PREFIX[rar.key]} ${arch.names[(Math.random() * arch.names.length) | 0]}`,
      dmg: Math.round(arch.dmg * dmgScale),
      cooldown: arch.cooldown, windup: arch.windup,
      range: arch.range, arc: arch.arc, projSpeed: arch.projSpeed || 0,
      stagger: arch.stagger || 0,
      enchants,
      price: rar.price + tier * 5,
    };
    applyEnchantStats(w);
    return w;
  }

  // bake enchant effects that modify flat weapon stats
  function applyEnchantStats(w) {
    const lv = k => { const e = w.enchants.find(e => e.key === k); return e ? (e.level || 1) : 0; };
    if (lv('sharpness')) w.dmg += 3 * lv('sharpness');
    if (lv('power'))     w.dmg += 3 * lv('power');
    if (lv('sweeping')) { w.range *= 1.3; w.arc = Math.min(Math.PI * 1.9, w.arc * 1.35); }
    if (lv('infinity'))  w.cooldown *= 0.6;
    // price bump for enchants
    w.price += w.enchants.reduce((s, e) => s + e.tier * 8 + (e.level || 0) * 4, 0);
  }

  function has(w, key) { const e = w && w.enchants.find(e => e.key === key); return e ? (e.level || 1) : 0; }

  function displayName(w) {
    const en = w.enchants.map(e => e.name + (e.level ? ' ' + ROMAN[e.level] : '')).join(', ');
    return w.name + (en ? ` [${en}]` : '');
  }

  return { RARITY, ENCHANTS, ARCHETYPES, TIER_NAMES, rollWeapon, has, displayName };
})();

</script>
<script>
// ============================================================================
// dungeon.js - procedural floor generation (Isaac-style room grid).
// GENERATOR TUNING at the top. Rooms are one screen each; doors N/S/E/W.
// ============================================================================
const Dungeon = (() => {

  // --- GENERATOR TUNING -------------------------------------------------------
  // room count per floor: BASE + floor*PER_FLOOR + random(0..RAND) -> 12..20 range
  const BASE_ROOMS = 10, PER_FLOOR = 2, RAND_ROOMS = 3;
  const TREASURE_ROOMS = [1, 2];            // min,max treasure rooms per floor
  const MIMIC_CHANCE = 0.22;                // chance a treasure chest is a mimic
  const OBSTACLES_PER_COMBAT = [0, 3];      // rocks per combat room

  // playfield geometry (the arena inside one room, in screen pixels)
  const PF = { x: 48, y: 48, w: 864, h: 444 };
  const DOOR_W = 76; // width of the door gap in a wall

  // room-type palettes: readable at a glance, per the design doc.
  // floor 2 shifts mossy, floor 3 shifts crimson (applied as a tint in tint()).
  const PALETTES = {
    start:    { floor: '#2a2d3a', wall: '#1a1c26', accent: '#8899bb', detail: '#333748' },
    combat:   { floor: '#262a33', wall: '#171a20', accent: '#5c6b80', detail: '#2e3440' },
    treasure: { floor: '#332d22', wall: '#211c12', accent: '#d4af37', detail: '#453b28' },
    shop:     { floor: '#33281f', wall: '#221812', accent: '#e8a04c', detail: '#46392c' },
    boss:     { floor: '#221820', wall: '#120c12', accent: '#a03050', detail: '#301f2c' },
    stairs:   { floor: '#232a2c', wall: '#141a1c', accent: '#4cc9a8', detail: '#2c3a3c' },
  };
  const FLOOR_TINT = { 1: null, 2: 'rgba(60,120,70,0.06)', 3: 'rgba(150,40,40,0.08)' };

  const DIRS = { N: [0, -1], S: [0, 1], E: [1, 0], W: [-1, 0] };
  const OPP = { N: 'S', S: 'N', E: 'W', W: 'E' };

  function key(x, y) { return x + ',' + y; }

  function makeRoom(gx, gy) {
    return {
      gx, gy, type: 'combat',
      doors: {},            // dir -> neighbor room
      visited: false, cleared: false, spawned: false,
      monsters: [], chests: [], obstacles: [], shopStock: null, stairs: null,
      dist: 0,
    };
  }

  // --- generation --------------------------------------------------------------
  function generateFloor(floorNum) {
    const target = BASE_ROOMS + PER_FLOOR * floorNum + ((Math.random() * (RAND_ROOMS + 1)) | 0);
    const grid = new Map();
    const start = makeRoom(0, 0);
    start.type = 'start';
    grid.set(key(0, 0), start);
    const list = [start];

    // frontier expansion: pick a random room, grow in a random direction,
    // reject placements that would touch >1 existing room (keeps a corridor feel)
    let guard = 0;
    while (list.length < target && guard++ < 2000) {
      const from = list[(Math.random() * list.length) | 0];
      const dirKeys = Object.keys(DIRS);
      const d = dirKeys[(Math.random() * 4) | 0];
      const nx = from.gx + DIRS[d][0], ny = from.gy + DIRS[d][1];
      if (grid.has(key(nx, ny))) continue;
      let touching = 0;
      for (const dk of dirKeys) {
        if (grid.has(key(nx + DIRS[dk][0], ny + DIRS[dk][1]))) touching++;
      }
      if (touching > 1) continue;
      const r = makeRoom(nx, ny);
      grid.set(key(nx, ny), r);
      list.push(r);
    }

    // connect doors by adjacency
    for (const r of list) {
      for (const dk of Object.keys(DIRS)) {
        const n = grid.get(key(r.gx + DIRS[dk][0], r.gy + DIRS[dk][1]));
        if (n) r.doors[dk] = n;
      }
    }

    // BFS distances from start
    const q = [start]; start.dist = 0;
    const seen = new Set([key(0, 0)]);
    while (q.length) {
      const r = q.shift();
      for (const dk of Object.keys(r.doors)) {
        const n = r.doors[dk];
        if (!seen.has(key(n.gx, n.gy))) {
          seen.add(key(n.gx, n.gy));
          n.dist = r.dist + 1;
          q.push(n);
        }
      }
    }

    // special room assignment: dead-ends sorted farthest-first
    const deadEnds = list.filter(r => r !== start && Object.keys(r.doors).length === 1)
                         .sort((a, b) => b.dist - a.dist);
    const fallback = list.filter(r => r !== start).sort((a, b) => b.dist - a.dist);
    const taken = new Set();
    function claim(type) {
      let room = deadEnds.find(r => !taken.has(r));
      if (!room) room = fallback.find(r => !taken.has(r));
      if (room) { room.type = type; taken.add(room); }
      return room;
    }

    // farthest special: boss on the last floor, stairs down otherwise
    claim(floorNum >= 3 ? 'boss' : 'stairs');
    claim('shop');
    const nTreasure = TREASURE_ROOMS[0] + ((Math.random() * (TREASURE_ROOMS[1] - TREASURE_ROOMS[0] + 1)) | 0);
    for (let i = 0; i < nTreasure; i++) claim('treasure');

    // populate room furniture (not monsters - those spawn on first entry)
    for (const r of list) {
      if (r.type === 'combat' || r.type === 'boss') {
        const n = OBSTACLES_PER_COMBAT[0] +
          ((Math.random() * (OBSTACLES_PER_COMBAT[1] - OBSTACLES_PER_COMBAT[0] + 1)) | 0);
        for (let i = 0; i < (r.type === 'boss' ? 0 : n); i++) {
          // keep rocks away from door lanes and the center spawn area
          const ox = PF.x + 90 + Math.random() * (PF.w - 180);
          const oy = PF.y + 90 + Math.random() * (PF.h - 180);
          if (Math.abs(ox - (PF.x + PF.w / 2)) < 120 && Math.abs(oy - (PF.y + PF.h / 2)) < 120) continue;
          r.obstacles.push({ x: ox, y: oy, r: 16 + Math.random() * 12 });
        }
      }
      if (r.type === 'treasure') {
        const nChests = Math.random() < 0.35 ? 2 : 1;
        for (let i = 0; i < nChests; i++) {
          r.chests.push({
            x: PF.x + PF.w / 2 + (i === 0 ? 0 : (Math.random() < 0.5 ? -90 : 90)),
            y: PF.y + PF.h / 2,
            opened: false,
            mimic: Math.random() < MIMIC_CHANCE,
            wobble: Math.random() * Math.PI * 2, // phase for the mimic's subtle idle tell
          });
        }
      }
      if (r.type === 'stairs') {
        r.stairs = { x: PF.x + PF.w / 2, y: PF.y + PF.h / 2, open: false };
      }
    }

    return { grid, start, rooms: list, floor: floorNum };
  }

  // combat rooms remaining before the boss/stairs gate opens
  function uncleared(dungeon) {
    return dungeon.rooms.filter(r => r.type === 'combat' && !r.cleared).length;
  }

  function paletteFor(room) { return PALETTES[room.type] || PALETTES.combat; }

  return { generateFloor, uncleared, paletteFor, PF, DOOR_W, DIRS, OPP, FLOOR_TINT, MIMIC_CHANCE };
})();

</script>
<script>
// ============================================================================
// monsters.js - the 8-type roster + mimics + summoned adds.
// SPAWN TABLES AND BASE STATS at the top for retuning.
// Every attack is telegraphed (windup flash / draw animation) so it can be
// dodged on reaction - this is a core design rule from the design doc.
// ============================================================================
const Monsters = (() => {
  const PF = Dungeon.PF;

  // --- BASE STATS -------------------------------------------------------------
  // hp/dmg scale with tier: hp * (1 + 0.30*(tier-1)), dmg * (1 + 0.15*(tier-1))
  const BASE = {
    chaser:   { hp: 26, dmg: 10, speed: 95,  r: 14, xp: 4,  coins: [1, 3] },
    archer:   { hp: 20, dmg: 9,  speed: 80,  r: 12, xp: 6,  coins: [1, 3] },
    tank:     { hp: 90, dmg: 18, speed: 42,  r: 22, xp: 12, coins: [3, 6] },
    swarmer:  { hp: 10, dmg: 6,  speed: 150, r: 9,  xp: 2,  coins: [0, 2] },
    glass:    { hp: 14, dmg: 24, speed: 70,  r: 12, xp: 6,  coins: [2, 4] },
    shielded: { hp: 55, dmg: 12, speed: 60,  r: 16, xp: 10, coins: [2, 5] },
    bomber:   { hp: 22, dmg: 20, speed: 120, r: 13, xp: 6,  coins: [2, 4] },
    summoner: { hp: 40, dmg: 0,  speed: 55,  r: 14, xp: 12, coins: [3, 6] },
    add:      { hp: 6,  dmg: 5,  speed: 140, r: 8,  xp: 1,  coins: [0, 1] },
    mimic:    { hp: 70, dmg: 14, speed: 105, r: 17, xp: 25, coins: [8, 14] },
    mimicbaby:{ hp: 18, dmg: 8,  speed: 115, r: 11, xp: 3,  coins: [1, 3] },
  };

  // --- SPAWN TABLE by tier (tier = floor + roomDist/3, see tierFor) ------------
  const SPAWN_TABLE = {
    1: ['chaser', 'chaser', 'swarmer'],
    2: ['chaser', 'swarmer', 'archer', 'bomber'],
    3: ['chaser', 'archer', 'bomber', 'glass', 'tank', 'swarmer'],
    4: ['archer', 'tank', 'glass', 'shielded', 'summoner', 'bomber'],
    5: ['tank', 'glass', 'shielded', 'summoner', 'archer', 'bomber'],
  };
  const COUNT = t => Math.min(8, 2 + t + ((Math.random() * 3) | 0)); // monsters per combat room

  function tierFor(floor, dist) { return Math.max(1, Math.min(5, floor + Math.floor(dist / 3))); }

  // ============================================================================
  function make(type, x, y, tier = 1) {
    const b = BASE[type];
    const hpMul = 1 + 0.30 * (tier - 1), dmgMul = 1 + 0.15 * (tier - 1);
    const m = {
      type, x, y, r: b.r,
      hp: Math.round(b.hp * hpMul), maxHp: Math.round(b.hp * hpMul),
      dmg: Math.round(b.dmg * dmgMul), speed: b.speed,
      xp: b.xp, coins: b.coins, tier,
      facing: 0, state: 'idle', t: Math.random() * 0.8, telegraph: 0,
      contactCd: 0, burn: null, stagger: 0, flash: 0,
      kvx: 0, kvy: 0, dead: false, spawnT: 0.35, // brief spawn-in so rooms don't insta-hit
      shieldUp: type === 'shielded',
      fuse: -1,
      update(dt, g) { update(this, dt, g); },
      draw(c, g) { draw(this, c, g); },
      takeHit(dmg, opts, g) { takeHit(this, dmg, opts, g); },
    };
    return m;
  }

  // --- shared movement helpers -------------------------------------------------
  function moveToward(m, tx, ty, dt, sp) {
    const dx = tx - m.x, dy = ty - m.y, d = Math.hypot(dx, dy) || 1;
    m.x += (dx / d) * sp * dt;
    m.y += (dy / d) * sp * dt;
    m.facing = Math.atan2(dy, dx);
  }
  function clampToField(m) {
    m.x = Math.max(PF.x + m.r, Math.min(PF.x + PF.w - m.r, m.x));
    m.y = Math.max(PF.y + m.r, Math.min(PF.y + PF.h - m.r, m.y));
  }
  function distToPlayer(m, g) { return Math.hypot(g.player.x - m.x, g.player.y - m.y); }

  function tryContactHit(m, g, mult = 1) {
    if (m.contactCd > 0) return;
    const p = g.player;
    if (Math.hypot(p.x - m.x, p.y - m.y) < m.r + p.r + 2) {
      p.damage(m.dmg * mult, m.x, m.y, g);
      m.contactCd = 0.8;
    }
  }

  // --- per-type AI --------------------------------------------------------------
  function update(m, dt, g) {
    if (m.spawnT > 0) { m.spawnT -= dt; return; }
    m.t += dt;
    if (m.contactCd > 0) m.contactCd -= dt;
    if (m.flash > 0) m.flash -= dt;

    // knockback decay
    m.x += m.kvx * dt; m.y += m.kvy * dt;
    m.kvx *= Math.pow(0.002, dt); m.kvy *= Math.pow(0.002, dt);

    // burn damage over time (from Flame / Fire Aspect)
    if (m.burn) {
      m.burn.t -= dt; m.burn.tick -= dt;
      if (m.burn.tick <= 0) {
        m.burn.tick = 0.5;
        applyDamage(m, m.burn.dps * 0.5, g, { silent: true, burn: true });
        Fx.burst(m.x, m.y - m.r, ['#ff9944', '#ffcc44'], 3, { speed: 40, life: 0.4, glow: true });
      }
      if (m.burn.t <= 0) m.burn = null;
    }
    if (m.dead) return;

    // bomber fuse burns through stagger and death throes - the blink IS the telegraph
    if (m.type === 'bomber' && m.fuse >= 0) {
      m.fuse -= dt;
      if (m.fuse <= 0) { explode(m, g); return; }
    }

    // stagger (from heavy weapon) freezes behavior briefly
    if (m.stagger > 0) { m.stagger -= dt; clampToField(m); return; }

    const p = g.player, dist = distToPlayer(m, g);

    switch (m.type) {
      case 'chaser':
      case 'mimicbaby':
      case 'add': {
        // telegraphed lunge when close: pause + flash, then dash
        if (m.state === 'idle') {
          moveToward(m, p.x, p.y, dt, m.speed);
          if (dist < 95 && m.t > 0.4) { m.state = 'windup'; m.t = 0; m.lungeAngle = Math.atan2(p.y - m.y, p.x - m.x); }
          tryContactHit(m, g);
        } else if (m.state === 'windup') {
          m.telegraph = 0.32 - m.t;
          if (m.t >= 0.32) { m.state = 'lunge'; m.t = 0; Sfx.play('swing'); }
        } else if (m.state === 'lunge') {
          m.x += Math.cos(m.lungeAngle) * m.speed * 3.4 * dt;
          m.y += Math.sin(m.lungeAngle) * m.speed * 3.4 * dt;
          tryContactHit(m, g, 1.2);
          if (m.t >= 0.28) { m.state = 'idle'; m.t = 0; }
        }
        break;
      }
      case 'swarmer': {
        // jittery fast chase, threatens through numbers
        const jx = Math.sin(m.t * 9 + m.x) * 40;
        moveToward(m, p.x + jx, p.y + Math.cos(m.t * 7) * 30, dt, m.speed);
        tryContactHit(m, g);
        break;
      }
      case 'archer': {
        // kite: keep 200-300px, back off if the player closes in
        if (dist < 170) moveToward(m, m.x * 2 - p.x, m.y * 2 - p.y, dt, m.speed);
        else if (dist > 310) moveToward(m, p.x, p.y, dt, m.speed * 0.8);
        else m.facing = Math.atan2(p.y - m.y, p.x - m.x);
        if (m.state === 'idle' && m.t > 2.1) { m.state = 'draw'; m.t = 0; }
        if (m.state === 'draw') {
          m.facing = Math.atan2(p.y - m.y, p.x - m.x); // tracks while drawing (dodge on release)
          m.telegraph = 0.6 - m.t;
          if (m.t >= 0.6) {
            m.state = 'idle'; m.t = 0;
            fireProjectile(g, m, m.facing, 330, m.dmg, '#cfe8b0', 4);
            Sfx.play('bowfire');
          }
        }
        break;
      }
      case 'tank': {
        if (m.state === 'idle') {
          moveToward(m, p.x, p.y, dt, m.speed);
          if (dist < 105 && m.t > 0.8) { m.state = 'windup'; m.t = 0; }
          tryContactHit(m, g, 0.6);
        } else if (m.state === 'windup') {
          m.telegraph = 0.75 - m.t; // long readable windup; heavy weapon stagger cancels it
          if (m.t >= 0.75) {
            m.state = 'slam'; m.t = 0;
            Fx.shake(7, 0.25); Sfx.play('heavy');
            Fx.burst(m.x, m.y, ['#8899aa', '#ffffff'], 16, { speed: 200, life: 0.4 });
            if (dist < 115 + p.r) p.damage(m.dmg, m.x, m.y, g);
          }
        } else if (m.state === 'slam') {
          if (m.t > 0.5) { m.state = 'idle'; m.t = 0; }
        }
        break;
      }
      case 'glass': {
        // fragile artillery: bright silhouette, brutal bolt, dies to a sneeze
        if (dist < 200) moveToward(m, m.x * 2 - p.x, m.y * 2 - p.y, dt, m.speed);
        else m.facing = Math.atan2(p.y - m.y, p.x - m.x);
        if (m.state === 'idle' && m.t > 1.8) { m.state = 'charge'; m.t = 0; }
        if (m.state === 'charge') {
          m.facing = Math.atan2(p.y - m.y, p.x - m.x);
          m.telegraph = 0.55 - m.t;
          if (m.t >= 0.55) {
            m.state = 'idle'; m.t = 0;
            fireProjectile(g, m, m.facing, 420, m.dmg, '#ff66dd', 6, { glow: true });
            Sfx.play('crit');
          }
        }
        break;
      }
      case 'shielded': {
        // shield blocks frontal damage; bash leaves it open - flank or bait
        if (m.state === 'idle') {
          m.shieldUp = true;
          moveToward(m, p.x, p.y, dt, m.speed);
          if (dist < 110 && m.t > 1.2) { m.state = 'windup'; m.t = 0; }
          tryContactHit(m, g, 0.7);
        } else if (m.state === 'windup') {
          m.telegraph = 0.45 - m.t;
          m.facing = Math.atan2(p.y - m.y, p.x - m.x);
          if (m.t >= 0.45) { m.state = 'bash'; m.t = 0; m.shieldUp = false; m.lungeAngle = m.facing; Sfx.play('swing'); }
        } else if (m.state === 'bash') {
          m.x += Math.cos(m.lungeAngle) * m.speed * 4 * dt;
          m.y += Math.sin(m.lungeAngle) * m.speed * 4 * dt;
          tryContactHit(m, g, 1.3);
          if (m.t > 0.3) { m.state = 'recover'; m.t = 0; } // shield stays down: punish window
        } else if (m.state === 'recover') {
          if (m.t > 0.9) { m.state = 'idle'; m.t = 0; }
        }
        break;
      }
      case 'bomber': {
        // rush and detonate; explosion also hurts other monsters (kite it!)
        // (fuse countdown lives above the stagger check so it always burns down)
        if (m.fuse < 0) {
          moveToward(m, p.x, p.y, dt, m.speed);
          if (dist < 65) { m.fuse = 0.8; Sfx.play('burn'); } // lit! blinking telegraph
        }
        break;
      }
      case 'summoner': {
        if (dist < 180) moveToward(m, m.x * 2 - p.x, m.y * 2 - p.y, dt, m.speed);
        if (m.state === 'idle' && m.t > 3.2) { m.state = 'channel'; m.t = 0; }
        if (m.state === 'channel') {
          m.telegraph = 1.0 - m.t;
          if (m.t >= 1.0) {
            m.state = 'idle'; m.t = 0;
            const adds = g.monsters.filter(x => x.type === 'add' && !x.dead).length;
            const n = Math.min(2, 6 - adds); // cap adds so rooms can't flood
            for (let i = 0; i < n; i++) {
              const a = Math.random() * Math.PI * 2;
              const add = make('add', m.x + Math.cos(a) * 40, m.y + Math.sin(a) * 40, m.tier);
              g.monsters.push(add);
              Fx.burst(add.x, add.y, '#66ff99', 8, { speed: 90, life: 0.4 });
            }
            Sfx.play('mimic');
          }
        }
        break;
      }
      case 'mimic': {
        // woken mimic: aggressive hopping chomper
        if (m.state === 'idle') {
          moveToward(m, p.x, p.y, dt, m.speed);
          m.hop = Math.abs(Math.sin(m.t * 8)) * 8;
          if (dist < 100 && m.t > 0.5) { m.state = 'windup'; m.t = 0; m.lungeAngle = Math.atan2(p.y - m.y, p.x - m.x); }
          tryContactHit(m, g);
        } else if (m.state === 'windup') {
          m.telegraph = 0.35 - m.t;
          if (m.t >= 0.35) { m.state = 'lunge'; m.t = 0; Sfx.play('mimic'); }
        } else if (m.state === 'lunge') {
          m.x += Math.cos(m.lungeAngle) * m.speed * 3.8 * dt;
          m.y += Math.sin(m.lungeAngle) * m.speed * 3.8 * dt;
          tryContactHit(m, g, 1.4);
          if (m.t >= 0.3) { m.state = 'idle'; m.t = 0; }
        }
        break;
      }
    }

    // rock collision (simple circle push-out)
    for (const o of g.room.obstacles) {
      const dx = m.x - o.x, dy = m.y - o.y, d = Math.hypot(dx, dy);
      if (d < o.r + m.r && d > 0) { m.x = o.x + (dx / d) * (o.r + m.r); m.y = o.y + (dy / d) * (o.r + m.r); }
    }
    clampToField(m);
  }

  function fireProjectile(g, m, angle, speed, dmg, color, r, opts = {}) {
    g.projectiles.push({
      x: m.x + Math.cos(angle) * (m.r + 6), y: m.y + Math.sin(angle) * (m.r + 6),
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      r, dmg, from: 'enemy', color, life: 3, glow: opts.glow || false, hitSet: null,
    });
  }

  function explode(m, g) {
    const R = 105;
    m.dead = true; m.exploded = true;
    Fx.shake(9, 0.3); Fx.hitstop(0.04); Sfx.play('explode');
    Fx.burst(m.x, m.y, ['#ff8833', '#ffcc44', '#ff4422', '#888888'], 30, { speed: 260, life: 0.6, glow: true });
    const p = g.player;
    if (Math.hypot(p.x - m.x, p.y - m.y) < R + p.r) p.damage(m.dmg, m.x, m.y, g);
    // friendly fire: rewards kiting the bomber into the pack
    for (const o of g.monsters) {
      if (o !== m && !o.dead && Math.hypot(o.x - m.x, o.y - m.y) < R + o.r) {
        applyDamage(o, m.dmg * 1.5, g, {});
      }
    }
    g.onKill(m);
  }

  // --- damage ---------------------------------------------------------------
  function takeHit(m, dmg, opts, g) {
    if (m.dead || m.spawnT > 0) return;
    // Shielded: blocks hits arriving from its front 120-degree arc while shield is up
    if (m.type === 'shielded' && m.shieldUp && opts.sx !== undefined) {
      const hitAngle = Math.atan2(opts.sy - m.y, opts.sx - m.x);
      let diff = Math.abs(((hitAngle - m.facing + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
      if (diff < Math.PI / 3) {
        Fx.burst(m.x + Math.cos(hitAngle) * m.r, m.y + Math.sin(hitAngle) * m.r, '#aaddff', 6, { speed: 120, life: 0.3 });
        Fx.text(m.x, m.y - m.r - 8, 'BLOCKED', '#aaddff', 11);
        Sfx.play('hit');
        return;
      }
    }
    if (opts.knock) {
      const ka = Math.atan2(m.y - opts.sy, m.x - opts.sx);
      const kmul = m.type === 'tank' ? 0.3 : 1;
      m.kvx += Math.cos(ka) * opts.knock * kmul;
      m.kvy += Math.sin(ka) * opts.knock * kmul;
    }
    if (opts.flame) m.burn = { t: 2.5, dps: 3 + opts.flame * 2, tick: 0.4 };
    if (opts.stagger) {
      m.stagger = Math.max(m.stagger, opts.stagger);
      // heavy hits INTERRUPT telegraphed attacks, not just delay them
      // (the tank windup is the designed testbed for this)
      if (['windup', 'draw', 'charge', 'channel'].includes(m.state)) {
        m.state = 'idle'; m.t = 0; m.telegraph = 0;
        Fx.text(m.x, m.y - m.r - 20, 'INTERRUPTED', '#aaddff', 11);
      }
    }
    applyDamage(m, dmg, g, opts);
  }

  function applyDamage(m, dmg, g, opts) {
    if (m.dead) return;
    if (m.type === 'bomber' && m.hp <= 0) return; // already in death throes, fuse lit
    m.hp -= dmg;
    m.flash = 0.12;
    // Executioner (ORIGINAL enchant): finish off weakened enemies (bosses resist)
    if (opts.execute && !m.isBoss && m.hp > 0 && m.hp <= m.maxHp * 0.3) {
      m.hp = 0;
      Fx.text(m.x, m.y - m.r - 18, 'EXECUTED', '#ffd24c', 14);
      Fx.burst(m.x, m.y, '#ffd24c', 12, { speed: 150, life: 0.5, glow: true });
    }
    if (!opts.silent) {
      Fx.text(m.x + (Math.random() * 16 - 8), m.y - m.r - 6, Math.round(dmg), opts.crit ? '#ffd24c' : '#ffffff', opts.crit ? 16 : 12);
      Fx.burst(m.x, m.y, opts.crit ? '#ffd24c' : '#ff6655', opts.crit ? 10 : 5, { speed: 110, life: 0.35 });
      Sfx.play(opts.crit ? 'crit' : 'hit');
    }
    if (m.hp <= 0) {
      if (m.type === 'bomber' && !m.exploded) {
        // dead-man's fuse: killing a bomber lights a SHORT telegraphed fuse instead
        // of detonating instantly (spec: death explosion must be dodgeable too)
        m.hp = 0;
        m.fuse = m.fuse >= 0 ? Math.min(m.fuse, 0.45) : 0.45;
        Sfx.play('burn');
        return;
      }
      m.dead = true;
      g.onKill(m);
    }
  }

  // --- room spawning ------------------------------------------------------------
  function spawnForRoom(room, floor, g) {
    const tier = tierFor(floor, room.dist);
    const table = SPAWN_TABLE[tier];
    const n = COUNT(tier);
    const out = [];
    const p = g.player;
    for (let i = 0; i < n; i++) {
      const type = table[(Math.random() * table.length) | 0];
      // swarmers arrive as a pack of 2-3 for the price of one slot
      const pack = type === 'swarmer' ? 2 + ((Math.random() * 2) | 0) : 1;
      for (let k = 0; k < pack; k++) {
        let x, y, tries = 0;
        do {
          x = PF.x + 60 + Math.random() * (PF.w - 120);
          y = PF.y + 60 + Math.random() * (PF.h - 120);
          tries++;
        } while (Math.hypot(x - p.x, y - p.y) < 160 && tries < 30);
        out.push(make(type, x, y, tier));
      }
    }
    return out;
  }

  // --- rendering ------------------------------------------------------------------
  function draw(m, c, g) {
    const p = g.player;
    c.save();
    c.translate(m.x, m.y - (m.hop || 0));

    // spawn-in: rise from a shadow
    if (m.spawnT > 0) {
      const k = 1 - m.spawnT / 0.35;
      c.globalAlpha = k;
      c.scale(k, k);
    }

    // telegraph flash: white-hot ring right before an attack lands
    const tele = m.telegraph > 0 && m.telegraph < 1 ? m.telegraph : 0;

    // damage flash
    const flash = m.flash > 0;

    const eyeA = Math.atan2(p.y - m.y, p.x - m.x);
    const ex = Math.cos(eyeA) * 3, ey = Math.sin(eyeA) * 3;

    switch (m.type) {
      case 'chaser': drawChaser(c, m, flash, ex, ey); break;
      case 'archer': drawArcher(c, m, flash, ex, ey); break;
      case 'tank': drawTank(c, m, flash, ex, ey); break;
      case 'swarmer': case 'add': drawSwarmer(c, m, flash, ex, ey); break;
      case 'glass': drawGlass(c, m, flash, ex, ey); break;
      case 'shielded': drawShielded(c, m, flash, ex, ey); break;
      case 'bomber': drawBomber(c, m, flash, ex, ey); break;
      case 'summoner': drawSummoner(c, m, flash, ex, ey); break;
      case 'mimic': case 'mimicbaby': drawMimicMonster(c, m, flash, ex, ey); break;
    }

    // burn flames
    if (m.burn) {
      c.fillStyle = 'rgba(255,150,50,0.7)';
      for (let i = 0; i < 3; i++) {
        const fx = Math.sin(Date.now() / 90 + i * 2.1) * m.r * 0.5;
        c.beginPath(); c.arc(fx, -m.r - 2 - (i * 2), 2.5, 0, Math.PI * 2); c.fill();
      }
    }

    // telegraph ring
    if (tele) {
      c.strokeStyle = `rgba(255,80,80,${0.4 + Math.sin(Date.now() / 40) * 0.3})`;
      c.lineWidth = 2.5;
      c.beginPath(); c.arc(0, 0, m.r + 6, 0, Math.PI * 2); c.stroke();
    }

    c.restore();

    // hp bar (only when damaged)
    if (m.hp < m.maxHp && !m.dead) {
      const w = m.r * 2.2;
      c.fillStyle = 'rgba(0,0,0,0.5)';
      c.fillRect(m.x - w / 2, m.y - m.r - 12, w, 4);
      c.fillStyle = m.hp / m.maxHp > 0.4 ? '#5cd65c' : '#e05555';
      c.fillRect(m.x - w / 2, m.y - m.r - 12, w * Math.max(0, m.hp / m.maxHp), 4);
    }
  }

  function body(c, m, color, flash) {
    c.fillStyle = flash ? '#ffffff' : color;
    c.beginPath(); c.arc(0, 0, m.r, 0, Math.PI * 2); c.fill();
  }
  function eyes(c, ex, ey, spread = 5, r = 2.5, color = '#fff') {
    c.fillStyle = color;
    c.beginPath(); c.arc(-spread + ex, -2 + ey, r, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(spread + ex, -2 + ey, r, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#111';
    c.beginPath(); c.arc(-spread + ex * 1.3, -2 + ey * 1.3, r * 0.45, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(spread + ex * 1.3, -2 + ey * 1.3, r * 0.45, 0, Math.PI * 2); c.fill();
  }

  function drawChaser(c, m, flash, ex, ey) {
    body(c, m, '#c0392b', flash);
    // horns
    c.fillStyle = flash ? '#fff' : '#7a1f14';
    c.beginPath(); c.moveTo(-m.r * 0.7, -m.r * 0.5); c.lineTo(-m.r * 1.1, -m.r * 1.3); c.lineTo(-m.r * 0.25, -m.r * 0.85); c.fill();
    c.beginPath(); c.moveTo(m.r * 0.7, -m.r * 0.5); c.lineTo(m.r * 1.1, -m.r * 1.3); c.lineTo(m.r * 0.25, -m.r * 0.85); c.fill();
    eyes(c, ex, ey, 5, 2.6, '#ffe08a');
  }
  function drawArcher(c, m, flash, ex, ey) {
    body(c, m, '#4a7c42', flash);
    eyes(c, ex, ey, 4, 2.2);
    // bow held toward facing; string draws back during 'draw' state
    c.save(); c.rotate(m.facing);
    c.strokeStyle = '#8a6b3a'; c.lineWidth = 2.5;
    c.beginPath(); c.arc(m.r + 4, 0, 9, -Math.PI / 2.2, Math.PI / 2.2); c.stroke();
    const pull = m.state === 'draw' ? Math.min(1, m.t / 0.6) * 7 : 0;
    c.strokeStyle = '#ddd'; c.lineWidth = 1;
    c.beginPath();
    c.moveTo(m.r + 4 + Math.cos(-Math.PI / 2.2) * 9, Math.sin(-Math.PI / 2.2) * 9);
    c.lineTo(m.r + 4 - pull, 0);
    c.lineTo(m.r + 4 + Math.cos(Math.PI / 2.2) * 9, Math.sin(Math.PI / 2.2) * 9);
    c.stroke();
    if (pull > 0) { c.strokeStyle = '#cfe8b0'; c.lineWidth = 2; c.beginPath(); c.moveTo(m.r + 4 - pull, 0); c.lineTo(m.r + 13 - pull, 0); c.stroke(); }
    c.restore();
  }
  function drawTank(c, m, flash, ex, ey) {
    // heavy hexagonal bruiser
    c.fillStyle = flash ? '#fff' : '#5d6d7e';
    c.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3 + Math.PI / 6;
      c[i ? 'lineTo' : 'moveTo'](Math.cos(a) * m.r, Math.sin(a) * m.r);
    }
    c.closePath(); c.fill();
    c.fillStyle = flash ? '#eee' : '#3d4a58';
    c.beginPath(); c.arc(0, 0, m.r * 0.55, 0, Math.PI * 2); c.fill();
    eyes(c, ex, ey, 6, 3, '#ff9a3d');
    // windup: fists rise
    if (m.state === 'windup') {
      const k = m.t / 0.75;
      c.fillStyle = '#8d9aa8';
      c.beginPath(); c.arc(-m.r - 4, -k * 14, 7, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(m.r + 4, -k * 14, 7, 0, Math.PI * 2); c.fill();
    }
  }
  function drawSwarmer(c, m, flash, ex, ey) {
    const col = m.type === 'add' ? '#57c26b' : '#8e5bb8';
    body(c, m, col, flash);
    // twitchy legs
    c.strokeStyle = flash ? '#fff' : (m.type === 'add' ? '#2e7040' : '#5a3878'); c.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + Math.sin(Date.now() / 60 + i) * 0.4;
      c.beginPath(); c.moveTo(Math.cos(a) * m.r * 0.7, Math.sin(a) * m.r * 0.7);
      c.lineTo(Math.cos(a) * (m.r + 5), Math.sin(a) * (m.r + 5)); c.stroke();
    }
    eyes(c, ex, ey, 3, 1.8);
  }
  function drawGlass(c, m, flash, ex, ey) {
    // unmistakable silhouette: glowing magenta diamond (priority target!)
    c.shadowColor = '#ff66dd'; c.shadowBlur = 14;
    c.fillStyle = flash ? '#fff' : '#e84393';
    c.beginPath();
    c.moveTo(0, -m.r * 1.5); c.lineTo(m.r, 0); c.lineTo(0, m.r * 1.5); c.lineTo(-m.r, 0);
    c.closePath(); c.fill();
    c.shadowBlur = 0;
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(ex, ey - 3, 2.5, 0, Math.PI * 2); c.fill();
    // charging: energy gathers
    if (m.state === 'charge') {
      const k = m.t / 0.55;
      c.strokeStyle = `rgba(255,102,221,${k})`; c.lineWidth = 2;
      c.beginPath(); c.arc(0, 0, m.r * 1.8 * (1 - k) + 4, 0, Math.PI * 2); c.stroke();
    }
  }
  function drawShielded(c, m, flash, ex, ey) {
    body(c, m, '#2e8b8b', flash);
    eyes(c, ex, ey, 4, 2.2);
    // tower shield facing the player (or dropped during bash/recover)
    c.save(); c.rotate(m.facing);
    if (m.shieldUp) {
      c.fillStyle = flash ? '#fff' : '#b8c6d0';
      c.fillRect(m.r - 2, -m.r - 4, 6, m.r * 2 + 8);
      c.fillStyle = '#7d8f9b';
      c.fillRect(m.r + 1, -m.r - 4, 2, m.r * 2 + 8);
    } else {
      // shield lowered: visibly held at the side (punish window!)
      c.fillStyle = '#b8c6d0';
      c.save(); c.rotate(1.1); c.fillRect(m.r - 4, m.r * 0.4, 5, m.r * 1.6); c.restore();
    }
    c.restore();
  }
  function drawBomber(c, m, flash, ex, ey) {
    // round bomb body; blinks faster as the fuse burns
    const lit = m.fuse >= 0;
    const blink = lit && Math.sin(Date.now() / (30 + m.fuse * 120)) > 0;
    body(c, m, blink ? '#ff5533' : '#d35400', flash);
    eyes(c, ex, ey, 4, 2.2);
    // fuse
    c.strokeStyle = '#7a5230'; c.lineWidth = 2.5;
    c.beginPath(); c.moveTo(0, -m.r); c.quadraticCurveTo(4, -m.r - 8, 8, -m.r - 10); c.stroke();
    if (lit) {
      c.fillStyle = '#ffe08a';
      c.beginPath(); c.arc(8, -m.r - 10, 3 + Math.random() * 2, 0, Math.PI * 2); c.fill();
    }
  }
  function drawSummoner(c, m, flash, ex, ey) {
    // hooded robe (triangle) + channel ring while summoning
    c.fillStyle = flash ? '#fff' : '#34495e';
    c.beginPath(); c.moveTo(0, -m.r * 1.4); c.lineTo(m.r * 1.1, m.r); c.lineTo(-m.r * 1.1, m.r); c.closePath(); c.fill();
    c.fillStyle = flash ? '#eee' : '#22303f';
    c.beginPath(); c.arc(0, -m.r * 0.55, m.r * 0.55, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#9ef01a';
    c.beginPath(); c.arc(-3 + ex, -m.r * 0.55 + ey, 2, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(3 + ex, -m.r * 0.55 + ey, 2, 0, Math.PI * 2); c.fill();
    if (m.state === 'channel') {
      const k = m.t / 1.0;
      c.strokeStyle = `rgba(158,240,26,${0.3 + 0.5 * Math.sin(k * 20)})`; c.lineWidth = 2;
      c.beginPath(); c.arc(0, 0, m.r + 10 + k * 8, 0, Math.PI * 2 * k); c.stroke();
    }
  }
  function drawMimicMonster(c, m, flash, ex, ey) {
    const s = m.type === 'mimicbaby' ? 0.65 : 1;
    // chest body with open jaw + teeth
    const jaw = m.state === 'windup' || m.state === 'lunge' ? 10 : 4 + Math.sin(Date.now() / 150) * 2;
    c.fillStyle = flash ? '#fff' : '#7a5230';
    c.fillRect(-16 * s, -6 * s, 32 * s, 14 * s); // lower box
    c.save();
    c.translate(0, -6 * s); c.rotate(-jaw * 0.045);
    c.fillStyle = flash ? '#eee' : '#8d6238';
    c.fillRect(-16 * s, -10 * s, 32 * s, 10 * s); // lid
    c.fillStyle = '#d4af37';
    c.fillRect(-16 * s, -3 * s, 32 * s, 2.5 * s);
    c.restore();
    // teeth
    c.fillStyle = '#f4ecd8';
    for (let i = -2; i <= 2; i++) {
      c.beginPath();
      c.moveTo(i * 6 * s - 2, -6 * s); c.lineTo(i * 6 * s, -1 * s); c.lineTo(i * 6 * s + 2, -6 * s);
      c.fill();
    }
    // tongue + eyes
    c.fillStyle = '#c0392b';
    c.beginPath(); c.ellipse(0, 2 * s, 6 * s, 3 * s, 0, 0, Math.PI); c.fill();
    c.fillStyle = '#ffd24c';
    c.beginPath(); c.arc(-6 * s + ex, -12 * s + ey, 2.2 * s, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(6 * s + ex, -12 * s + ey, 2.2 * s, 0, Math.PI * 2); c.fill();
  }

  return { make, spawnForRoom, tierFor, BASE, SPAWN_TABLE };
})();

</script>
<script>
// ============================================================================
// boss.js - THE MIMIC KING (surprise boss, designed 2026-07-10).
// A giant crowned treasure chest: the dungeon's hoard grew teeth.
// Thematically ties to the mimic system - the whole dungeon was baiting you.
//
// FIGHT SCRIPT (all attacks telegraphed, each with a dodge answer):
//   1. Chomp Lunge  - rears back glinting, then lunges at your position: SIDESTEP.
//   2. Coin Barrage - spins up, sprays two radial waves of coins: ROLL THROUGH (i-frames).
//   3. (below 50%) Royal Slam - leaps offscreen, shadow tracks you, lands with
//      expanding shockwave rings + summons 2 baby mimics: TIME YOUR ROLL through rings.
//   Enrage below 25%: everything comes faster.
//
// All numbers below are tunable; the designer (Sam's son) may redesign this boss -
// keep the phase machine intact and swap the attack parameters/visuals.
// ============================================================================
const Boss = (() => {
  const PF = Dungeon.PF;

  const STATS = {
    hp: 520,           // scaled up by meta difficulty if ever needed
    contactDmg: 16,
    lungeDmg: 22,
    coinDmg: 10,
    slamDmg: 24,
    speed: 60,
    r: 34,
  };

  function make() {
    const b = {
      type: 'boss', name: 'THE MIMIC KING',
      x: PF.x + PF.w / 2, y: PF.y + PF.h * 0.35,
      r: STATS.r, hp: STATS.hp, maxHp: STATS.hp,
      dmg: STATS.contactDmg, xp: 120, coins: [30, 45],
      facing: 0, state: 'idle', t: 0, telegraph: 0,
      contactCd: 0, burn: null, stagger: 0, flash: 0, kvx: 0, kvy: 0,
      dead: false, spawnT: 0, isBoss: true,
      jaw: 4, hop: 0, crownGlint: 0,
      attackQueue: 0, // rotates attacks so it doesn't repeat one forever
      shadowX: 0, shadowY: 0, // slam landing indicator
      update(dt, g) { update(this, dt, g); },
      draw(c, g) { draw(this, c, g); },
      takeHit(dmg, opts, g) { takeHit(this, dmg, opts, g); },
    };
    return b;
  }

  function phase(b) { return b.hp < b.maxHp * 0.25 ? 3 : b.hp < b.maxHp * 0.5 ? 2 : 1; }
  function speedMul(b) { return phase(b) === 3 ? 1.45 : phase(b) === 2 ? 1.15 : 1; }

  function update(b, dt, g) {
    b.t += dt;
    if (b.contactCd > 0) b.contactCd -= dt;
    if (b.flash > 0) b.flash -= dt;
    b.crownGlint += dt;

    // burn ticks (boss is not immune, just beefy)
    if (b.burn) {
      b.burn.t -= dt; b.burn.tick -= dt;
      if (b.burn.tick <= 0) {
        b.burn.tick = 0.5;
        b.hp -= b.burn.dps * 0.5;
        Fx.burst(b.x, b.y - b.r, ['#ff9944', '#ffcc44'], 3, { speed: 40, life: 0.4, glow: true });
        if (b.hp <= 0 && !b.dead) die(b, g);
      }
      if (b.burn.t <= 0) b.burn = null;
    }
    if (b.dead) return;

    const p = g.player;
    const dist = Math.hypot(p.x - b.x, p.y - b.y);
    const sm = speedMul(b);

    switch (b.state) {
      case 'idle': {
        // heavy hops toward the player, contact damage, picks next attack
        b.hop = Math.abs(Math.sin(b.t * 5)) * 10;
        b.jaw = 4 + Math.sin(b.t * 5) * 2;
        moveToward(b, p.x, p.y, dt, STATS.speed * sm);
        if (b.contactCd <= 0 && dist < b.r + p.r + 2) {
          p.damage(STATS.contactDmg, b.x, b.y, g);
          b.contactCd = 0.9;
        }
        const wait = phase(b) === 3 ? 1.1 : 1.8;
        if (b.t > wait) {
          b.t = 0;
          const ph = phase(b);
          // attack rotation: lunge, coins, lunge, (slam if phase>=2)
          const cycle = ph >= 2 ? ['lungeTele', 'coinTele', 'slamTele', 'lungeTele', 'coinTele']
                                : ['lungeTele', 'coinTele'];
          b.state = cycle[b.attackQueue % cycle.length];
          b.attackQueue++;
        }
        break;
      }

      // --- ATTACK 1: CHOMP LUNGE (sidestep it) -------------------------------
      case 'lungeTele': {
        // rears back with a bright gold glint - the "I'm about to bite" tell
        b.jaw = 14;
        b.telegraph = 1;
        b.facing = Math.atan2(p.y - b.y, p.x - b.x);
        if (b.t === dt) Sfx.play('mimic');
        if (b.t >= 0.65 / sm) {
          b.state = 'lunge'; b.t = 0; b.telegraph = 0;
          b.lungeAngle = Math.atan2(p.y - b.y, p.x - b.x); // locked at launch: sidestep wins
          Sfx.play('roar');
        }
        break;
      }
      case 'lunge': {
        b.x += Math.cos(b.lungeAngle) * 480 * dt;
        b.y += Math.sin(b.lungeAngle) * 480 * dt;
        b.jaw = 16;
        Fx.burst(b.x, b.y, '#d4af37', 2, { speed: 60, life: 0.3 });
        if (b.contactCd <= 0 && dist < b.r + p.r + 4) {
          p.damage(STATS.lungeDmg, b.x, b.y, g);
          b.contactCd = 0.9;
        }
        if (b.t >= 0.42) { b.state = 'idle'; b.t = 0; }
        break;
      }

      // --- ATTACK 2: COIN BARRAGE (roll through with i-frames) -----------------
      case 'coinTele': {
        b.jaw = 12;
        b.telegraph = 1;
        b.hop = Math.abs(Math.sin(b.t * 20)) * 6; // rattles like a shaken piggy bank
        if (b.t >= 0.6 / sm) { b.state = 'coinFire'; b.t = 0; b.telegraph = 0; b.wave = 0; }
        break;
      }
      case 'coinFire': {
        if ((b.wave === 0 && b.t > 0.05) || (b.wave === 1 && b.t > 0.45 / sm)) {
          const n = 14, offset = b.wave * (Math.PI / n); // second wave fills the gaps
          for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2 + offset;
            g.projectiles.push({
              x: b.x + Math.cos(a) * (b.r + 4), y: b.y + Math.sin(a) * (b.r + 4),
              vx: Math.cos(a) * 240, vy: Math.sin(a) * 240,
              r: 6, dmg: STATS.coinDmg, from: 'enemy', color: '#ffd24c', life: 3, glow: true, spin: true,
            });
          }
          Sfx.play('coin'); Sfx.play('bowfire');
          b.wave++;
        }
        if (b.wave >= 2 && b.t > 0.9 / sm) { b.state = 'idle'; b.t = 0; }
        break;
      }

      // --- ATTACK 3 (phase 2+): ROYAL SLAM + baby mimics ------------------------
      case 'slamTele': {
        // leaps up out of play; a royal shadow tracks the player - get moving.
        // speed is LATCHED at leap start so the ~0.28s frozen-shadow window
        // (the dodge answer) can't collapse if a burn tick shifts the phase mid-air
        if (!b.airborne) b.slamSm = sm;
        b.telegraph = 1;
        b.airborne = true;
        if (b.t < 1.15 / b.slamSm - 0.28) {
          b.shadowX = b.x + (p.x - b.x) * Math.min(1, b.t * 1.6);
          b.shadowY = b.y + (p.y - b.y) * Math.min(1, b.t * 1.6);
        }
        if (b.t >= 1.15 / b.slamSm) {
          b.state = 'slamLand'; b.t = 0; b.telegraph = 0;
          b.x = b.shadowX; b.y = b.shadowY;
          b.airborne = false;
          clamp(b);
          Fx.shake(12, 0.4); Fx.hitstop(0.06); Sfx.play('explode'); Sfx.play('roar');
          Fx.burst(b.x, b.y, ['#d4af37', '#8d6238', '#fff'], 34, { speed: 300, life: 0.6, glow: true });
          b.rings = [0, -55, -110]; // three expanding shockwave rings (negative = delayed)
          // royal guard: summon babies (cap 4 in the room)
          const babies = g.monsters.filter(x => x.type === 'mimicbaby' && !x.dead).length;
          for (let i = 0; i < Math.min(2, 4 - babies); i++) {
            const a = Math.random() * Math.PI * 2;
            const baby = Monsters.make('mimicbaby', b.x + Math.cos(a) * 70, b.y + Math.sin(a) * 70, 2);
            g.monsters.push(baby);
          }
          if (Math.hypot(p.x - b.x, p.y - b.y) < b.r + p.r + 20) p.damage(STATS.slamDmg, b.x, b.y, g);
        }
        break;
      }
      case 'slamLand': {
        // expanding rings: each hits once at its radius band; roll through them
        let allDone = true;
        b.rings = b.rings.map(r0 => r0 + 320 * dt);
        for (const rr of b.rings) {
          if (rr < 0) { allDone = false; continue; }
          if (rr < 260) allDone = false;
          const pd = Math.hypot(p.x - b.x, p.y - b.y);
          if (Math.abs(pd - rr) < 12 && rr > 20) p.damage(10, b.x, b.y, g); // player.damage has i-frames built in
        }
        if (allDone || b.t > 1.4) { b.state = 'idle'; b.t = 0; b.rings = null; }
        break;
      }
    }

    clamp(b);
  }

  function moveToward(b, tx, ty, dt, sp) {
    const dx = tx - b.x, dy = ty - b.y, d = Math.hypot(dx, dy) || 1;
    b.x += (dx / d) * sp * dt; b.y += (dy / d) * sp * dt;
    b.facing = Math.atan2(dy, dx);
  }
  function clamp(b) {
    b.x = Math.max(PF.x + b.r, Math.min(PF.x + PF.w - b.r, b.x));
    b.y = Math.max(PF.y + b.r, Math.min(PF.y + PF.h - b.r, b.y));
  }

  function takeHit(b, dmg, opts, g) {
    if (b.dead || b.airborne) return; // can't be hit mid-slam-leap
    if (opts.flame) b.burn = { t: 2.5, dps: 3 + opts.flame * 2, tick: 0.4 };
    b.hp -= dmg;
    b.flash = 0.1;
    Fx.text(b.x + (Math.random() * 30 - 15), b.y - b.r - 10, Math.round(dmg), opts.crit ? '#ffd24c' : '#fff', opts.crit ? 16 : 12);
    Fx.burst(b.x, b.y, '#d4af37', 4, { speed: 100, life: 0.3 });
    Sfx.play(opts.crit ? 'crit' : 'hit');
    if (b.hp <= 0) die(b, g);
  }

  function die(b, g) {
    b.dead = true;
    // coin fountain + guaranteed legendary: the hoard was real after all
    Fx.shake(14, 0.6); Fx.hitstop(0.12); Sfx.play('explode'); Sfx.play('roar');
    Fx.burst(b.x, b.y, ['#ffd24c', '#d4af37', '#fff', '#8d6238'], 80, { speed: 380, life: 1.1, glow: true, grav: 200 });
    g.onKill(b);
  }

  // --- rendering: giant crowned chest -------------------------------------------
  function draw(b, c, g) {
    // slam shadow indicator while airborne
    if (b.airborne) {
      c.fillStyle = 'rgba(0,0,0,0.45)';
      c.beginPath(); c.ellipse(b.shadowX, b.shadowY, 40, 18, 0, 0, Math.PI * 2); c.fill();
      c.strokeStyle = `rgba(255,80,80,${0.5 + Math.sin(Date.now() / 50) * 0.3})`;
      c.lineWidth = 3;
      c.beginPath(); c.ellipse(b.shadowX, b.shadowY, 46, 22, 0, 0, Math.PI * 2); c.stroke();
      return; // the king himself is off-screen
    }

    // shockwave rings
    if (b.rings) {
      for (const rr of b.rings) {
        if (rr <= 0) continue;
        c.strokeStyle = `rgba(212,175,55,${Math.max(0, 1 - rr / 260)})`;
        c.lineWidth = 7;
        c.beginPath(); c.arc(b.x, b.y, rr, 0, Math.PI * 2); c.stroke();
      }
    }

    c.save();
    c.translate(b.x, b.y - b.hop);
    const s = b.r / 17; // chest sprite scale factor (mimic sprite at ~2x)
    const flash = b.flash > 0;

    // body
    c.fillStyle = flash ? '#fff' : '#6b4726';
    c.fillRect(-17 * s, -6 * s, 34 * s, 15 * s);
    c.fillStyle = flash ? '#eee' : '#59391c';
    c.fillRect(-17 * s, 6 * s, 34 * s, 3 * s);
    // lid (jaw)
    c.save();
    c.translate(0, -6 * s); c.rotate(-b.jaw * 0.045);
    c.fillStyle = flash ? '#eee' : '#7d5530';
    c.fillRect(-17 * s, -11 * s, 34 * s, 11 * s);
    c.fillStyle = '#d4af37';
    c.fillRect(-17 * s, -3.5 * s, 34 * s, 3 * s);
    // CROWN - the royal tell
    c.fillStyle = '#ffd24c';
    c.beginPath();
    c.moveTo(-10 * s, -11 * s);
    c.lineTo(-10 * s, -17 * s); c.lineTo(-6 * s, -13 * s);
    c.lineTo(-2 * s, -18 * s); c.lineTo(2 * s, -13 * s);
    c.lineTo(6 * s, -18 * s); c.lineTo(10 * s, -13 * s);
    c.lineTo(10 * s, -11 * s);
    c.closePath(); c.fill();
    // crown jewel glint
    const gl = Math.sin(b.crownGlint * 3) * 0.5 + 0.5;
    c.fillStyle = `rgba(255,80,120,${0.5 + gl * 0.5})`;
    c.beginPath(); c.arc(0, -14 * s, 2 * s, 0, Math.PI * 2); c.fill();
    c.restore();

    // teeth
    c.fillStyle = '#f4ecd8';
    for (let i = -3; i <= 3; i++) {
      c.beginPath();
      c.moveTo(i * 5 * s - 2 * s, -6 * s); c.lineTo(i * 5 * s, 0); c.lineTo(i * 5 * s + 2 * s, -6 * s);
      c.fill();
    }
    // tongue
    c.fillStyle = '#c0392b';
    c.beginPath(); c.ellipse(0, 3 * s, 8 * s, 4 * s, 0, 0, Math.PI); c.fill();
    // gold spilling out
    c.fillStyle = '#ffd24c';
    for (let i = 0; i < 5; i++) {
      const a = i * 1.3 + b.crownGlint;
      c.beginPath(); c.arc(Math.sin(a) * 12 * s, 8 * s, 2 * s, 0, Math.PI * 2); c.fill();
    }
    // eyes tracking the player
    const p = g.player;
    const ea = Math.atan2(p.y - b.y, p.x - b.x);
    c.fillStyle = '#ffd24c';
    c.beginPath(); c.arc(-8 * s + Math.cos(ea) * 2, -14 * s + Math.sin(ea) * 2, 3 * s, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(8 * s + Math.cos(ea) * 2, -14 * s + Math.sin(ea) * 2, 3 * s, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#7a1f14';
    c.beginPath(); c.arc(-8 * s + Math.cos(ea) * 3.4, -14 * s + Math.sin(ea) * 3.4, 1.4 * s, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(8 * s + Math.cos(ea) * 3.4, -14 * s + Math.sin(ea) * 3.4, 1.4 * s, 0, Math.PI * 2); c.fill();

    // telegraph glow
    if (b.telegraph) {
      c.strokeStyle = `rgba(255,80,80,${0.4 + Math.sin(Date.now() / 45) * 0.3})`;
      c.lineWidth = 3;
      c.beginPath(); c.arc(0, 0, b.r + 10, 0, Math.PI * 2); c.stroke();
    }
    if (b.burn) {
      c.fillStyle = 'rgba(255,150,50,0.7)';
      for (let i = 0; i < 4; i++) {
        const fx = Math.sin(Date.now() / 90 + i * 1.8) * b.r * 0.6;
        c.beginPath(); c.arc(fx, -b.r - 3 - i * 2, 3, 0, Math.PI * 2); c.fill();
      }
    }
    c.restore();
  }

  return { make, STATS };
})();

</script>
<script>
// ============================================================================
// player.js - movement, the dodge roll (headline mechanic!), weapons, leveling.
// ============================================================================
const PlayerDef = (() => {
  const PF = Dungeon.PF;

  // --- PLAYER TUNING ----------------------------------------------------------
  const T = {
    speed: 205,
    maxHp: 100,
    rollSpeed: 430,
    rollDur: 0.26,
    rollCooldown: 0.85,     // headline mechanic: 0.5-1s per the design doc
    rollIframes: 0.30,      // slightly longer than the roll itself (forgiving)
    hurtIframes: 0.7,       // grace period after taking a hit
    critBase: 0.05,
    critMult: 1.7,
  };

  class Player {
    constructor(meta) {
      this.x = PF.x + PF.w / 2; this.y = PF.y + PF.h / 2;
      this.r = 13;
      // meta-progression boosts (from the hub) fold into starting stats
      const mHp = (meta?.ranks?.vitality || 0) * 10;
      this.maxHp = T.maxHp + mHp;
      this.hp = this.maxHp;
      this.coins = 0; this.essenceRun = 0;
      this.xp = 0; this.level = 1;
      this.kills = 0; this.roomsCleared = 0;

      // stat multipliers - passive upgrades stack into these
      this.stats = {
        dmgMul: 1 + (meta?.ranks?.might || 0) * 0.05,
        speedMul: 1,
        rollCdMul: 1 - (meta?.ranks?.acrobat || 0) * 0.08,
        crit: 0,
        coinMul: 1 + (meta?.ranks?.greed || 0) * 0.10,
        regen: 0,
        atkSpeedMul: 1,
      };

      // weapon slots: one melee + one bow. Tab / wheel / right-click to swap.
      // always start with exactly a Common light melee (Uncommon with the Armory unlock)
      const startRarity = meta?.ranks?.armory ? 1 : 0;
      this.weapons = {
        melee: Weapons.rollWeapon(1, { archetype: 'light', exactRarity: startRarity }),
        bow: null,
      };
      this.slot = 'melee';

      this.vx = 0; this.vy = 0;
      this.facing = 0;           // aim angle (mouse)
      this.moveAngle = 0;        // last movement direction (roll uses this)
      this.moving = false;

      this.rollT = -1;           // >=0 while rolling
      this.rollCd = 0;
      this.iframes = 0;
      this.ghostTimer = 0;

      this.attackCd = 0;
      this.swing = null;         // {t,dur,windup,fired,arc,range,dir}
      this.drawT = -1;           // bow draw time (>=0 while drawing)
      this.momentumT = 0;        // ORIGINAL enchant: speed burst after kills
      this.flash = 0;
      this.dead = false;
    }

    get weapon() { return this.weapons[this.slot] || this.weapons.melee; }

    xpToNext() { return 18 + (this.level - 1) * 14; } // leveling curve

    addXp(n, g) {
      this.xp += n;
      while (this.xp >= this.xpToNext()) {
        this.xp -= this.xpToNext();
        this.level++;
        this.hp = Math.min(this.maxHp, this.hp + 15); // level-up heals a chunk
        Sfx.play('levelup');
        Fx.burst(this.x, this.y, ['#ffd24c', '#7fd4ff', '#fff'], 24, { speed: 200, life: 0.8, glow: true });
        g.queueLevelUp();
      }
    }

    swapWeapon() {
      if (this.weapons.bow && this.weapons.melee) {
        this.slot = this.slot === 'melee' ? 'bow' : 'melee';
        this.drawT = -1;
        this.swing = null; // swap cancels a committed swing (applyMelee reads the live weapon)
        Sfx.play('ui');
      }
    }

    // picking up a weapon replaces the one in its slot; old one drops behind you
    pickupWeapon(w, g) {
      const slot = w.archetype === 'bow' ? 'bow' : 'melee';
      const old = this.weapons[slot];
      this.weapons[slot] = w;
      this.slot = slot;
      if (old) g.dropWeaponPickup(old, this.x, this.y + 30);
      Sfx.play('pickup');
      Fx.text(this.x, this.y - 26, Weapons.displayName(w), w.color, 12);
    }

    damage(dmg, sx, sy, g) {
      // winTimer > 0 = boss just died: celebration invulnerability, and it closes
      // the die-after-victory race that double-banked essence
      if (this.iframes > 0 || this.dead || g.state !== 'play' || g.winTimer > 0) return;
      this.hp -= dmg;
      this.iframes = T.hurtIframes;
      this.flash = 0.25;
      Fx.shake(6, 0.25);
      Sfx.play('hurt');
      Fx.burst(this.x, this.y, '#ff5555', 10, { speed: 150, life: 0.4 });
      // knock away from the source
      const a = Math.atan2(this.y - sy, this.x - sx);
      this.vx += Math.cos(a) * 180; this.vy += Math.sin(a) * 180;
      if (this.hp <= 0) { this.hp = 0; this.dead = true; g.onPlayerDeath(); }
    }

    heal(n) {
      this.hp = Math.min(this.maxHp, this.hp + n);
      Sfx.play('heal');
      Fx.burst(this.x, this.y, '#6ee7a0', 12, { speed: 90, life: 0.6, glow: true });
      Fx.text(this.x, this.y - 24, '+' + n, '#6ee7a0', 13);
    }

    update(dt, g, input) {
      if (this.dead) return;
      const stats = this.stats;

      if (this.iframes > 0) this.iframes -= dt;
      if (this.rollCd > 0) this.rollCd -= dt;
      if (this.attackCd > 0) this.attackCd -= dt * stats.atkSpeedMul;
      if (this.flash > 0) this.flash -= dt;
      if (this.momentumT > 0) this.momentumT -= dt;
      if (stats.regen > 0 && this.hp < this.maxHp) this.hp = Math.min(this.maxHp, this.hp + stats.regen * dt);

      // aim at the mouse
      this.facing = Math.atan2(input.mouse.y - this.y, input.mouse.x - this.x);

      // --- movement ---------------------------------------------------------
      let mx = 0, my = 0;
      if (input.key('KeyW') || input.key('ArrowUp')) my -= 1;
      if (input.key('KeyS') || input.key('ArrowDown')) my += 1;
      if (input.key('KeyA') || input.key('ArrowLeft')) mx -= 1;
      if (input.key('KeyD') || input.key('ArrowRight')) mx += 1;
      this.moving = mx !== 0 || my !== 0;
      if (this.moving) {
        const len = Math.hypot(mx, my);
        mx /= len; my /= len;
        this.moveAngle = Math.atan2(my, mx);
      }

      // --- DODGE ROLL: the headline mechanic ----------------------------------
      if (this.rollT >= 0) {
        this.rollT += dt;
        const k = this.rollT / T.rollDur;
        if (k >= 1) {
          this.rollT = -1;
        } else {
          // burst of speed along the roll direction, eased out
          const sp = T.rollSpeed * (1 - k * 0.45);
          this.x += Math.cos(this.rollAngle) * sp * dt;
          this.y += Math.sin(this.rollAngle) * sp * dt;
          // afterimage trail
          this.ghostTimer -= dt;
          if (this.ghostTimer <= 0) {
            this.ghostTimer = 0.028;
            Fx.ghost({ x: this.x, y: this.y, r: this.r, rot: k * Math.PI * 2, color: '#7fd4ff' });
          }
        }
      } else {
        // normal movement (momentum enchant gives a brief speed burst after kills)
        const mom = this.momentumT > 0 ? 1.25 : 1;
        const sp = T.speed * stats.speedMul * mom;
        this.x += mx * sp * dt;
        this.y += my * sp * dt;
        // roll trigger
        if ((input.pressed('Space') || input.pressed('ShiftLeft') || input.pressed('ShiftRight')) && this.rollCd <= 0) {
          this.rollT = 0;
          this.rollAngle = this.moving ? this.moveAngle : this.facing;
          this.rollCd = T.rollCooldown * stats.rollCdMul;
          this.iframes = Math.max(this.iframes, T.rollIframes);
          this.drawT = -1; // rolling cancels a bow draw
          Sfx.play('roll');
          Fx.burst(this.x, this.y, '#7fd4ff', 6, { speed: 80, life: 0.3 });
        }
      }

      // hit knockback decay
      this.x += this.vx * dt; this.y += this.vy * dt;
      this.vx *= Math.pow(0.001, dt); this.vy *= Math.pow(0.001, dt);

      // obstacles + walls
      for (const o of g.room.obstacles) {
        const dx = this.x - o.x, dy = this.y - o.y, d = Math.hypot(dx, dy);
        if (d < o.r + this.r && d > 0) { this.x = o.x + (dx / d) * (o.r + this.r); this.y = o.y + (dy / d) * (o.r + this.r); }
      }
      // (walls/doors are handled by main.js so it can detect room exits)

      // --- attacking -----------------------------------------------------------
      const w = this.weapon;
      if (w.archetype === 'bow') {
        // hold to draw, release to fire; longer draw = harder arrow
        if (input.mouse.down && this.rollT < 0) {
          if (this.drawT < 0 && this.attackCd <= 0) { this.drawT = 0; Sfx.play('bowdraw'); }
          if (this.drawT >= 0) this.drawT += dt;
        } else if (this.drawT >= 0) {
          this.fireBow(g);
          this.drawT = -1;
        }
      } else {
        if (input.mouse.down && this.attackCd <= 0 && this.rollT < 0) this.startSwing(g);
      }

      // ongoing swing (heavy applies damage at end of windup)
      if (this.swing) {
        this.swing.t += dt;
        if (!this.swing.fired && this.swing.t >= this.swing.windup) {
          this.swing.fired = true;
          this.applyMelee(g);
        }
        if (this.swing.t >= this.swing.dur) this.swing = null;
      }
    }

    startSwing(g) {
      const w = this.weapon;
      const windup = w.windup;
      this.swing = {
        t: 0, windup,
        dur: windup + 0.18,
        dir: this.facing,
        arc: w.arc, range: w.range,
        fired: windup === 0 ? false : false,
        side: (this.lastSide = -(this.lastSide || 1)), // light alternates swing side
        heavy: w.archetype === 'heavy',
      };
      this.attackCd = w.cooldown;
      if (windup === 0) { this.swing.fired = true; this.applyMelee(g); Sfx.play('swing'); }
      else Sfx.play('swing');
    }

    applyMelee(g) {
      const w = this.weapon, stats = this.stats;
      const dir = this.facing; // heavy re-aims at release: feels responsive
      this.swing.dir = dir;
      if (w.archetype === 'heavy') {
        Sfx.play('heavy');
        Fx.hitstop(0.055);      // hit-stop freeze frame on the heavy swing
        Fx.shake(5, 0.18);
      }
      let hitAny = false;
      for (const m of g.monsters) {
        if (m.dead) continue;
        const dx = m.x - this.x, dy = m.y - this.y;
        const d = Math.hypot(dx, dy);
        if (d > w.range + m.r) continue;
        let diff = Math.abs(((Math.atan2(dy, dx) - dir + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
        if (diff > w.arc / 2) continue;
        const crit = Math.random() < T.critBase + stats.crit;
        const dmg = w.dmg * stats.dmgMul * (crit ? T.critMult : 1);
        m.takeHit(dmg, {
          sx: this.x, sy: this.y,
          knock: (Weapons.has(w, 'knockback') ? 260 : 90) + (w.archetype === 'heavy' ? 160 : 0),
          flame: Weapons.has(w, 'fireaspect'),
          stagger: w.stagger,
          execute: !!Weapons.has(w, 'executioner'),
          crit, fromPlayer: true,
        }, g);
        hitAny = true;
      }
      if (hitAny && w.archetype === 'heavy') Fx.shake(7, 0.22);
    }

    fireBow(g) {
      const w = this.weapon, stats = this.stats;
      const draw = Math.min(1, this.drawT / 0.8); // full power at 0.8s draw
      if (this.drawT < 0.08) { this.attackCd = 0.1; return; } // tap = dry-fire nothing
      const n = Weapons.has(w, 'multishot') ? 3 : 1;
      const spread = 0.14;
      for (let i = 0; i < n; i++) {
        const a = this.facing + (i - (n - 1) / 2) * spread;
        const crit = Math.random() < T.critBase + stats.crit;
        g.projectiles.push({
          x: this.x + Math.cos(a) * 16, y: this.y + Math.sin(a) * 16,
          vx: Math.cos(a) * w.projSpeed * (0.65 + draw * 0.5),
          vy: Math.sin(a) * w.projSpeed * (0.65 + draw * 0.5),
          r: 4, dmg: w.dmg * stats.dmgMul * (0.55 + draw * 0.65) * (crit ? T.critMult : 1),
          from: 'player', color: crit ? '#ffd24c' : '#e8e3d0', life: 1.6,
          pierce: Weapons.has(w, 'piercing') ? 3 : 0,
          knock: Weapons.has(w, 'punch') ? 240 : 60,
          flame: Weapons.has(w, 'flame'),
          crit, arrow: true, hitSet: new Set(),
        });
      }
      this.attackCd = w.cooldown;
      Sfx.play('bowfire');
    }

    // --- rendering -----------------------------------------------------------------
    draw(c, g) {
      if (this.dead) return;
      c.save();
      c.translate(this.x, this.y);

      // roll cooldown indicator: small radial arc under the player
      if (this.rollCd > 0) {
        const k = 1 - this.rollCd / (T.rollCooldown * this.stats.rollCdMul);
        c.strokeStyle = 'rgba(127,212,255,0.5)';
        c.lineWidth = 3;
        c.beginPath(); c.arc(0, this.r + 8, 6, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * k); c.stroke();
      } else {
        c.fillStyle = 'rgba(127,212,255,0.55)';
        c.beginPath(); c.arc(0, this.r + 8, 3, 0, Math.PI * 2); c.fill();
      }

      // i-frame flicker
      if (this.iframes > 0 && this.rollT < 0 && Math.sin(Date.now() / 30) > 0) c.globalAlpha = 0.45;

      // squash & stretch + spin through the roll
      if (this.rollT >= 0) {
        const k = this.rollT / T.rollDur;
        c.rotate(this.rollAngle + k * Math.PI * 2 * (Math.cos(this.rollAngle) >= 0 ? 1 : -1));
        c.scale(1 + 0.25 * Math.sin(k * Math.PI), 1 - 0.3 * Math.sin(k * Math.PI));
      }

      // shadow
      c.fillStyle = 'rgba(0,0,0,0.35)';
      c.beginPath(); c.ellipse(0, this.r * 0.85, this.r * 0.9, this.r * 0.35, 0, 0, Math.PI * 2); c.fill();

      // cloak
      c.fillStyle = this.flash > 0 ? '#ff8080' : '#2c3e60';
      c.beginPath(); c.arc(0, 2, this.r, 0, Math.PI * 2); c.fill();
      // body
      c.fillStyle = this.flash > 0 ? '#ffb0b0' : '#4a6fa5';
      c.beginPath(); c.arc(0, -2, this.r * 0.85, 0, Math.PI * 2); c.fill();
      // visor facing aim
      c.save();
      c.rotate(this.rollT >= 0 ? 0 : this.facing);
      c.fillStyle = '#0e1420';
      c.fillRect(this.r * 0.15, -4, this.r * 0.75, 8);
      c.fillStyle = '#9ee7ff';
      c.fillRect(this.r * 0.3, -2.5, this.r * 0.5, 5);
      c.restore();

      c.restore();

      // weapon rendering (outside the roll transform)
      if (this.rollT < 0) this.drawWeapon(c);
    }

    drawWeapon(c) {
      const w = this.weapon;
      c.save();
      c.translate(this.x, this.y);
      c.rotate(this.facing);
      if (w.archetype === 'bow') {
        const pull = this.drawT >= 0 ? Math.min(1, this.drawT / 0.8) : 0;
        c.strokeStyle = w.color; c.lineWidth = 3;
        c.beginPath(); c.arc(this.r + 7, 0, 11, -Math.PI / 2.1, Math.PI / 2.1); c.stroke();
        c.strokeStyle = '#ccc'; c.lineWidth = 1;
        const tipY = Math.sin(Math.PI / 2.1) * 11;
        c.beginPath();
        c.moveTo(this.r + 7 + Math.cos(-Math.PI / 2.1) * 11, -tipY);
        c.lineTo(this.r + 7 - pull * 8, 0);
        c.lineTo(this.r + 7 + Math.cos(Math.PI / 2.1) * 11, tipY);
        c.stroke();
        if (pull > 0) {
          c.strokeStyle = '#e8e3d0'; c.lineWidth = 2.5;
          c.beginPath(); c.moveTo(this.r + 7 - pull * 8, 0); c.lineTo(this.r + 18 - pull * 8, 0); c.stroke();
          // full-draw sparkle
          if (pull >= 1) { c.fillStyle = '#ffd24c'; c.beginPath(); c.arc(this.r + 19 - pull * 8, 0, 2.5, 0, Math.PI * 2); c.fill(); }
        }
        c.restore();
        return;
      }
      c.restore();

      // melee: draw the swing arc while swinging, otherwise blade at rest
      if (this.swing) {
        const s = this.swing;
        const w2 = this.weapon;
