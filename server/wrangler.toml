# Cloudflare Worker + Durable Object for Gilded King co-op (Sam, 2026-07-11).
# One Durable Object instance == one lobby (keyed by the room code). It is a
# WebSocket relay + membership/host tracker; the HOST client owns the authoritative
# game simulation and broadcasts world state through here.
#
# Local dev (no Cloudflare account needed):  npx wrangler dev
# Deploy for friends (needs `npx wrangler login` once):  npx wrangler deploy
name = "gilded-king-mp"
main = "src/index.js"
compatibility_date = "2026-01-01"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[durable_objects.bindings]]
name = "LEADERBOARD"
class_name = "Leaderboard"

[[migrations]]
tag = "v1"
# free plan requires SQLite-backed Durable Objects (we don't use storage; the
# relay is in-memory, but the class must be declared this way). [code 10097]
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
# the global leaderboard DO persists scores in SQLite-backed storage
new_sqlite_classes = ["Leaderboard"]
